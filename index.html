<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Nutrients DB CRUD</title>
<style>
  table { border-collapse: collapse; }
  th, td { border: 1px solid #ccc; padding: 4px; }
  dialog form {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  dialog form .field-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  dialog form .field-row label {
    min-width: 220px;
    font-weight: 600;
  }
  dialog form .field-row input {
    flex: 1;
    box-sizing: border-box;
  }
  dialog form .form-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
</style>
</head>
<body>
<h1>База продуктов</h1>
<p>Количество продуктов: <span id="count"></span></p>
<button id="openAddDialog" type="button">Добавить продукт</button>
<table id="productsTable">
  <thead>
    <tr>
      <th>Продукт</th>
      <th>Белки</th>
      <th>Насыщенные</th>
      <th>НЕнасыщенные</th>
      <th>Простые</th>
      <th>Сложные перевариваемые</th>
      <th>Растворимая</th>
      <th>Нерастворимая</th>
      <th>ККал</th>
      <th>Действия</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<dialog id="addDialog">
  <form id="addForm">
    <h2>Добавить продукт</h2>
    <div class="field-row">
      <label for="add-product">Продукт</label>
      <input id="add-product" name="Продукт" required>
    </div>
    <div class="field-row">
      <label for="add-proteins">Белки</label>
      <input id="add-proteins" name="Белки" type="number" step="any" required>
    </div>
    <div class="field-row">
      <label for="add-saturated">Насыщенные</label>
      <input id="add-saturated" name="Насыщенные" type="number" step="any" required>
    </div>
    <div class="field-row">
      <label for="add-unsaturated">НЕнасыщенные</label>
      <input id="add-unsaturated" name="НЕнасыщенные" type="number" step="any" required>
    </div>
    <div class="field-row">
      <label for="add-simple">Простые</label>
      <input id="add-simple" name="Простые" type="number" step="any" required>
    </div>
    <div class="field-row">
      <label for="add-complex">Сложные перевариваемые</label>
      <input id="add-complex" name="Сложные перевариваемые" type="number" step="any" required>
    </div>
    <div class="field-row">
      <label for="add-soluble">Растворимая</label>
      <input id="add-soluble" name="Растворимая" type="number" step="any" required>
    </div>
    <div class="field-row">
      <label for="add-insoluble">Нерастворимая</label>
      <input id="add-insoluble" name="Нерастворимая" type="number" step="any" required>
    </div>
    <div class="form-actions">
      <button type="submit">Добавить</button>
      <button type="button" id="cancelAdd">Отмена</button>
    </div>
  </form>
</dialog>

<dialog id="editDialog">
  <form id="editForm">
    <h2>Редактировать продукт</h2>
    <div class="field-row">
      <label for="edit-product">Продукт</label>
      <input id="edit-product" name="Продукт" required>
    </div>
    <div class="field-row">
      <label for="edit-proteins">Белки</label>
      <input id="edit-proteins" name="Белки" type="number" step="any" required>
    </div>
    <div class="field-row">
      <label for="edit-saturated">Насыщенные</label>
      <input id="edit-saturated" name="Насыщенные" type="number" step="any" required>
    </div>
    <div class="field-row">
      <label for="edit-unsaturated">НЕнасыщенные</label>
      <input id="edit-unsaturated" name="НЕнасыщенные" type="number" step="any" required>
    </div>
    <div class="field-row">
      <label for="edit-simple">Простые</label>
      <input id="edit-simple" name="Простые" type="number" step="any" required>
    </div>
    <div class="field-row">
      <label for="edit-complex">Сложные перевариваемые</label>
      <input id="edit-complex" name="Сложные перевариваемые" type="number" step="any" required>
    </div>
    <div class="field-row">
      <label for="edit-soluble">Растворимая</label>
      <input id="edit-soluble" name="Растворимая" type="number" step="any" required>
    </div>
    <div class="field-row">
      <label for="edit-insoluble">Нерастворимая</label>
      <input id="edit-insoluble" name="Нерастворимая" type="number" step="any" required>
    </div>
    <div class="form-actions">
      <button type="submit">Сохранить</button>
      <button type="button" id="cancelEdit">Отмена</button>
    </div>
  </form>
</dialog>

<script>
const fieldNames = ["Продукт","Белки","Насыщенные","НЕнасыщенные","Простые","Сложные перевариваемые","Растворимая","Нерастворимая","ККал"];
const inputFieldNames = fieldNames.filter(f => f !== "ККал");
const nutrientFieldNames = inputFieldNames.filter(f => f !== "Продукт");

const addDialog = document.getElementById('addDialog');
const addForm = document.getElementById('addForm');
const openAddButton = document.getElementById('openAddDialog');
const cancelAddButton = document.getElementById('cancelAdd');
const editDialog = document.getElementById('editDialog');
const editForm = document.getElementById('editForm');
const cancelEditButton = document.getElementById('cancelEdit');

function showDialog(dialog) {
  if (!dialog) return;
  if (typeof dialog.showModal === 'function') {
    dialog.showModal();
  } else {
    dialog.setAttribute('open', 'true');
  }
}

function hideAddDialog() {
  if (!addDialog) return;
  if (typeof addDialog.close === 'function') {
    addDialog.close();
  } else {
    addDialog.removeAttribute('open');
  }
  if (addForm) {
    addForm.reset();
  }
}

function hideEditDialog() {
  if (typeof editDialog.close === 'function') {
    editDialog.close();
  } else {
    editDialog.removeAttribute('open');
  }
  editForm.reset();
  delete editForm.dataset.originalName;
}

function collectPayload(formData) {
  const payload = {};
  let nutrientSum = 0;
  for (const fn of inputFieldNames) {
    const raw = formData.get(fn);
    const value = raw !== null ? String(raw).trim() : '';
    if (value === '') {
      return {error: 'Все поля обязательны'};
    }
    if (!nutrientFieldNames.includes(fn)) {
      payload[fn] = value;
      continue;
    }
    const normalized = value.replace(',', '.');
    const numericValue = Number(normalized);
    if (Number.isNaN(numericValue)) {
      return {error: 'Некорректное число в поле ' + fn};
    }
    nutrientSum += numericValue;
    payload[fn] = normalized;
  }
  if (nutrientSum - 100 > 1e-6) {
    return {error: 'Сумма значений нутриентов > 100'};
  }
  return {payload};
}

async function fetchProducts(){
  const res = await fetch('/api/products');
  const data = await res.json();
  const tbody = document.querySelector('#productsTable tbody');
  tbody.innerHTML = '';
  data.forEach(p => {
    const tr = document.createElement('tr');
    fieldNames.forEach(fn => {
      const td = document.createElement('td');
      td.textContent = p[fn];
      tr.appendChild(td);
    });
    const tdAct = document.createElement('td');
    const btnEdit = document.createElement('button');
    btnEdit.textContent = 'Редактировать';
    btnEdit.onclick = () => openEditDialog(p);
    const btnDel = document.createElement('button');
    btnDel.textContent = 'Удалить';
    btnDel.onclick = () => deleteProduct(p['Продукт']);
    tdAct.appendChild(btnEdit);
    tdAct.appendChild(btnDel);
    tr.appendChild(tdAct);
    tbody.appendChild(tr);
  });
  document.getElementById('count').textContent = data.length;
}

async function deleteProduct(name){
  if(!confirm('Удалить ' + name + '?')) return;
  const res = await fetch('/api/products/' + encodeURIComponent(name), {method:'DELETE'});
  if(res.ok) fetchProducts();
}

function openEditDialog(prod){
  editForm.dataset.originalName = prod['Продукт'];
  for (const fn of inputFieldNames) {
    const input = editForm.querySelector(`[name="${fn}"]`);
    if (input) {
      input.value = prod[fn] ?? '';
    }
  }
  showDialog(editDialog);
}

if (openAddButton) {
  openAddButton.addEventListener('click', () => {
    if (addForm) {
      addForm.reset();
    }
    showDialog(addDialog);
  });
}

if (cancelAddButton) {
  cancelAddButton.addEventListener('click', () => {
    hideAddDialog();
  });
}

if (addDialog) {
  addDialog.addEventListener('close', () => {
    if (addForm) {
      addForm.reset();
    }
  });
}

cancelEditButton.addEventListener('click', () => {
  hideEditDialog();
});

if (editDialog) {
  editDialog.addEventListener('close', () => {
    editForm.reset();
    delete editForm.dataset.originalName;
  });
}

editForm.addEventListener('submit', async e => {
  e.preventDefault();
  const result = collectPayload(new FormData(editForm));
  if (result.error) {
    alert(result.error);
    return;
  }
  const originalName = editForm.dataset.originalName;
  if (!originalName) {
    alert('Не удалось определить редактируемый продукт');
    return;
  }
  const res = await fetch('/api/products/' + encodeURIComponent(originalName), {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(result.payload)
  });
  if (res.ok) {
    hideEditDialog();
    fetchProducts();
  } else {
    let message = 'Ошибка';
    try {
      const err = await res.json();
      message = err.error || message;
    } catch (err) {
      // игнорируем проблемы чтения тела ответа
    }
    alert(message);
  }
});

addForm.addEventListener('submit', async e => {
  e.preventDefault();
  const result = collectPayload(new FormData(addForm));
  if (result.error) {
    alert(result.error);
    return;
  }
  const res = await fetch('/api/products', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(result.payload)
  });
  if(res.ok){
    hideAddDialog();
    fetchProducts();
  }else{
    const err = await res.json();
    alert(err.error || 'Ошибка');
  }
});

fetchProducts();
</script>
</body>
</html>
